<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 634.6395263671875 489" width="634.6395263671875" height="489"><!-- svg-source:excalidraw --><metadata></metadata><defs><style class="style-fonts">
      @font-face { font-family: Excalifont; src: url(data:font/woff2;base64,); }</style></defs><rect x="0" y="0" width="634.6395263671875" height="489" fill="#121212"></rect><g transform="translate(30.25 57.00001525878906) rotate(0 120.3099365234375 25)"><text x="0" y="17.619999999999997" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#56a2e8" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">I : [ 1 , 2,  -1,  3, -4, -5]</text><text x="0" y="42.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#56a2e8" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">O: [ 1,  -1,  2,  -4, 3, -5]</text></g><g transform="translate(20.7940820312499 10) rotate(0 213.37786865234375 16.5)"><text x="0" y="23.258400000000005" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="26.400000000000006px" fill="#39994b" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Re-Arrange Array Element by sign</text></g><g transform="translate(22.49993896484375 180.50001525878906) rotate(0 177.89987182617188 50)"><text x="0" y="17.619999999999997" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Approach 1 : Create two seprate list</text><text x="0" y="42.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">        1) One for positive number</text><text x="0" y="67.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">        2) Other for negative number</text><text x="0" y="92.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">        3) Merge them with</text></g><g transform="translate(24.5 117.50004577636719) rotate(0 184.909912109375 25)"><text x="0" y="17.619999999999997" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#ff8383" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Postive number at even index (2* i)</text><text x="0" y="42.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#ff8383" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Negative number at odd index (2* i)+1</text></g><g transform="translate(10 304) rotate(0 307.31976318359375 87.5)"><text x="0" y="17.619999999999997" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Approach 2 : Using two pointer</text><text x="0" y="42.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">1) Create another array with same size</text><text x="0" y="67.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">2) Create two pointer </text><text x="0" y="92.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">    positiveIndex = 0</text><text x="0" y="117.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">    negativeIndex = 1</text><text x="0" y="142.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">3) if we found positive number then increase that index with 2</text><text x="0" y="167.62" font-family="Excalifont, Xiaolai, sans-serif, Segoe UI Emoji" font-size="20px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">same goes with negative number</text></g></svg>